{% extends "base.html" %}
{% block content %}
<form class="form-panel" method="post" action="{% url 'departement_save' %}">
    {% csrf_token %}
    {% if departement %}<input type="hidden" name="id" value="{{ departement.id }}">{% endif %}
    <h3>{{ page_title }}</h3>
    {{ form.as_p }}
    <button class="btn btn-accent">Enregistrer</button>
</form>
{% endblock %}
