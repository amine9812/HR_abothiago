{% extends "base.html" %}
{% block content %}
<div class="panel mb-3"><h3>{{ conversation.sujet }}</h3>{% for m in conversation.messages.all %}<div class="request-item mb-2"><div><strong>{{ m.expediteur }}</strong><small>{{ m.date_envoi }}</small><p>{{ m.contenu }}</p></div></div>{% endfor %}</div>
<form method="post" class="form-panel">{% csrf_token %}{{ form.as_p }}<button class="btn btn-accent">Repondre</button></form>
{% endblock %}
